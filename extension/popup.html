<!DOCTYPE html>
<html>
<head>
  <title>Ad Blocker</title>
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
    }
    h1 {
      margin: 0 0 15px 0;
      font-size: 18px;
      text-align: center;
      color: #5865F2;
    }
    .toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f0f0f0;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-primary {
      background: #5865F2;
      color: white;
    }
    .btn-primary:hover {
      background: #4752C4;
    }
    .btn-secondary {
      background: #7289DA;
      color: white;
    }
    .status {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>🛡️ Ad Blocker</h1>

  <div class="toggle">
    <span><strong>Block Ads</strong></span>
    <input type="checkbox" id="blockAds" checked>
  </div>

  <button id="helpBtn" class="btn-secondary">💬 Need Help? Join Discord</button>

  <div class="status" id="status">Ad Blocker is <strong>ACTIVE</strong></div>

  <script src="popup.js"></script>
</body>
</html>
